apiVersion: v1
kind: Namespace
metadata:
    name: homepage
---
apiVersion: v1
kind: ConfigMap
metadata:
    name: homepage-config
    namespace: homepage
data:
    settings.yaml: |
        title: HomeLab Dashboard
        headerStyle: clean
        theme: dark
        color: slate
        statusStyle: dot
        hideVersion: true
        layout:
          Infrastructure:
            style: grid
            columns: 4
          Automation:
            style: grid
            columns: 3
          IoT and Smarthome:
            style: grid
            columns: 3
          Security and Identity:
            style: grid
            columns: 3
          Repositories:
            style: list
          Cloud Services:
            style: list
          Cloud Platforms:
            style: list
    custom.css: |
        :root {
          --card-radius: 14px;
        }

        body {
          background:
            linear-gradient(rgba(8, 12, 24, 0.62), rgba(8, 12, 24, 0.72)),
            url("https://raw.githubusercontent.com/orangci/walls-catppuccin-mocha/master/keyboard-2.png")
              center/cover no-repeat fixed !important;
          background-attachment: fixed !important;
        }

        .information-widget {
          backdrop-filter: blur(6px);
        }

        .service {
          border: 1px solid rgba(255, 255, 255, 0.06);
        }
    custom.js: |
        // Intentionally left blank.
    widgets.yaml: |
        - logo:
            icon: https://raw.githubusercontent.com/kubernetes/kubernetes/master/logo/logo.svg
        - datetime:
            locale: uk-UA
            text_size: 2xl
            format:
              dateStyle: long
              timeStyle: short
        - resources:
            cpu: true
            memory: true
            disk: /
    bookmarks.yaml: |
        - Docs:
            - Kubernetes:
                - abbr: K8S
                  href: https://kubernetes.io/docs/
            - FluxCD:
                - abbr: FL
                  href: https://fluxcd.io/
            - Helm:
                - abbr: HM
                  href: https://helm.sh/docs/
        - Tools:
            - Artifact Hub:
                - abbr: AH
                  href: https://artifacthub.io/
            - GitHub:
                - abbr: GH
                  href: https://github.com/
    kubernetes.yaml: |
        mode: cluster
        show_node_stats: true
    docker.yaml: |
        []
    services.yaml: |
        - Infrastructure:
            - Pi-hole:
                href: http://192.168.0.10:30081/admin
                icon: pi-hole.png
                description: Network-wide Ad Blocking
            - AdGuard Home:
                href: http://192.168.1.10:30082
                icon: adguard-home.png
                description: DNS & filtering
            - Grafana:
                href: http://grafana.home.lab:30080/
                icon: grafana.png
                description: Dashboards
            - TrueNAS:
                href: http://192.168.1.10
                icon: truenas.png
                description: Storage
        - Automation:
            - Home Assistant:
                href: http://192.168.1.10:30123
                icon: home-assistant.png
                description: Smart home orchestration
            - Argo CD:
                href: http://argocd.home.lab
                icon: argo-cd.png
                description: GitOps delivery
            - Semaphore:
                href: http://semaphore.home.lab
                icon: ansible.png
                description: Ansible automation
        - IoT and Smarthome:
            - Zigbee2MQTT:
                href: http://zigbee.home.lab
                icon: mqtt.png
                description: Zigbee bridge
            - Mosquitto:
                href: http://mqtt.home.lab
                icon: mqtt.png
                description: MQTT broker
            - Node-RED:
                href: http://nodered.home.lab
                icon: node-red.png
                description: Flows & automations
        - Security and Identity:
            - Authentik:
                href: http://authentik.home.lab
                icon: authentik.png
                description: SSO & identity
            - Vaultwarden:
                href: http://vaultwarden.home.lab
                icon: vaultwarden.png
                description: Password manager
            - Passbolt:
                href: http://passbolt.home.lab
                icon: passbolt.png
                description: Team password vault
        - Repositories:
            - homelab-gitops:
                href: https://github.com/your-org/homelab-gitops
                icon: github.png
                description: GitOps manifests
            - infra-live:
                href: https://github.com/your-org/infra-live
                icon: github.png
                description: Terraform live configs
            - boilerplates:
                href: https://github.com/your-org/boilerplates
                icon: github.png
                description: Reusable templates
        - Cloud Services:
            - Cloudflare:
                href: https://dash.cloudflare.com
                icon: cloudflare.png
                description: DNS / WAF / Tunnel
            - Tailscale:
                href: https://login.tailscale.com
                icon: tailscale.png
                description: Zero-trust mesh VPN
            - Telegram:
                href: https://web.telegram.org
                icon: telegram.png
                description: Alerts and bots
        - Cloud Platforms:
            - Hetzner:
                href: https://console.hetzner.cloud
                icon: hetzner.png
                description: VMs and networks
            - AWS:
                href: https://console.aws.amazon.com
                icon: aws.png
                description: Cloud workloads
            - DigitalOcean:
                href: https://cloud.digitalocean.com
                icon: digital-ocean.png
                description: Apps and droplets
---
apiVersion: v1
kind: ServiceAccount
metadata:
    name: homepage
    namespace: homepage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    name: homepage
rules:
    - apiGroups: [""]
      resources: ["nodes", "pods", "namespaces", "services"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["networking.k8s.io"]
      resources: ["ingresses"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["apps"]
      resources: ["deployments", "statefulsets"]
      verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
    name: homepage
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: homepage
subjects:
    - kind: ServiceAccount
      name: homepage
      namespace: homepage
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: homepage
    namespace: homepage
spec:
    replicas: 1
    selector:
        matchLabels:
            app: homepage
    template:
        metadata:
            labels:
                app: homepage
        spec:
            serviceAccountName: homepage
            initContainers:
                - name: init-config
                  image: busybox:1.36
                  command:
                      [
                          "sh",
                          "-c",
                          "cp -a /config-ro/. /config/ && mkdir -p /config/logs",
                      ]
                  volumeMounts:
                      - name: config-ro
                        mountPath: /config-ro
                        readOnly: true
                      - name: config
                        mountPath: /config
            containers:
                - name: homepage
                  image: ghcr.io/gethomepage/homepage@sha256:b129cb0f674bd6d204e215bde2c2fc3f11d6ad0e82f6d20007cf80f74e1acbb1
                  env:
                      - name: HOMEPAGE_ALLOWED_HOSTS
                        value: homepage.home.lab,homepage.home.lab:30080
                  ports:
                      - containerPort: 3000
                  volumeMounts:
                      - name: config
                        mountPath: /app/config
            volumes:
                - name: config-ro
                  configMap:
                      name: homepage-config
                - name: config
                  emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
    name: homepage
    namespace: homepage
spec:
    selector:
        app: homepage
    ports:
        - port: 80
          targetPort: 3000
