apiVersion: v1
kind: Namespace
metadata:
    name: homepage
---
apiVersion: v1
kind: ConfigMap
metadata:
    name: homepage-config
    namespace: homepage
data:
    settings.yaml: |
        title: HomeLab Dashboard
        headerStyle: clean
        background:
          image: https://raw.githubusercontent.com/orangci/walls-catppuccin-mocha/master/keyboard-2.png
          blur: sm
          brightness: 35
          saturation: 110
        theme: dark
        color: slate
        statusStyle: dot
        hideVersion: true
        layout:
          Infrastructure:
            style: grid
            columns: 4
          Automation:
            style: grid
            columns: 3
          IoT and Smarthome:
            style: grid
            columns: 3
          Security and Identity:
            style: grid
            columns: 3
          Repositories:
            style: list
          Cloud Services:
            style: list
          Cloud Platforms:
            style: list
    custom.css: |
        :root {
          --card-radius: 14px;
        }

        .information-widget {
          backdrop-filter: blur(6px);
        }

        .service {
          border: 1px solid rgba(255, 255, 255, 0.06);
        }
    custom.js: |
        // Intentionally left blank.
    widgets.yaml: |
        - logo:
            icon: https://raw.githubusercontent.com/kubernetes/kubernetes/master/logo/logo.svg
        - datetime:
            locale: uk-UA
            text_size: 2xl
            format:
              dateStyle: long
              timeStyle: short
        - kubernetes:
            cluster:
              show: true
              cpu: true
              memory: true
              nodes: true
        - resources:
            cpu: true
            memory: true
            disk: /
    bookmarks.yaml: |
        - Docs:
            - Kubernetes:
                - abbr: K8S
                  href: https://kubernetes.io/docs/
            - FluxCD:
                - abbr: FL
                  href: https://fluxcd.io/
            - Helm:
                - abbr: HM
                  href: https://helm.sh/docs/
        - Tools:
            - Artifact Hub:
                - abbr: AH
                  href: https://artifacthub.io/
            - GitHub:
                - abbr: GH
                  href: https://github.com/
    kubernetes.yaml: |
        mode: cluster
        show_node_stats: true
    docker.yaml: |
        []
    services.yaml: |
        - Infrastructure:
            - Pi-hole:
                href: http://192.168.1.10:30081/admin
                icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/svg/pi-hole.svg
                description: Network-wide Ad Blocking
            - AdGuard Home:
                href: http://192.168.1.10:30082
                icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/svg/adguard-home.svg
                description: DNS & filtering
            - Grafana:
                href: http://grafana.home.lab:30080/
                icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/svg/grafana.svg
                description: Dashboards
            - TrueNAS:
                href: http://192.168.1.10
                icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/svg/truenas.svg
                description: Storage
        - Automation:
            - Home Assistant:
                href: http://192.168.1.10:30123
                icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/svg/home-assistant.svg
                description: Smart home orchestration
            - Argo CD:
                href: http://argocd.home.lab
                icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/svg/argo-cd.svg
                description: GitOps delivery
            - Semaphore:
                href: http://semaphore.home.lab
                icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/svg/ansible.svg
                description: Ansible automation
        - IoT and Smarthome:
            - Zigbee2MQTT:
                href: http://zigbee.home.lab
                icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/svg/mqtt.svg
                description: Zigbee bridge
            - Mosquitto:
                href: http://mqtt.home.lab
                icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/svg/mqtt.svg
                description: MQTT broker
            - Node-RED:
                href: http://nodered.home.lab
                icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/svg/node-red.svg
                description: Flows & automations
        - Security and Identity:
            - Authentik:
                href: http://authentik.home.lab
                icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/svg/authentik.svg
                description: SSO & identity
            - Vaultwarden:
                href: http://vaultwarden.home.lab
                icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/svg/vaultwarden.svg
                description: Password manager
            - Passbolt:
                href: http://passbolt.home.lab
                icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/svg/passbolt.svg
                description: Team password vault
        - Repositories:
            - homelab-gitops:
                href: https://github.com/your-org/homelab-gitops
                icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/svg/github.svg
                description: GitOps manifests
            - infra-live:
                href: https://github.com/your-org/infra-live
                icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/svg/github.svg
                description: Terraform live configs
            - boilerplates:
                href: https://github.com/your-org/boilerplates
                icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/svg/github.svg
                description: Reusable templates
        - Cloud Services:
            - Cloudflare:
                href: https://dash.cloudflare.com
                icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/svg/cloudflare.svg
                description: DNS / WAF / Tunnel
            - Tailscale:
                href: https://login.tailscale.com
                icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/svg/tailscale.svg
                description: Zero-trust mesh VPN
            - Telegram:
                href: https://web.telegram.org
                icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/svg/telegram.svg
                description: Alerts and bots
        - Cloud Platforms:
            - Hetzner:
                href: https://console.hetzner.cloud
                icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/svg/hetzner.svg
                description: VMs and networks
            - AWS:
                href: https://console.aws.amazon.com
                icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/svg/aws.svg
                description: Cloud workloads
            - DigitalOcean:
                href: https://cloud.digitalocean.com
                icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/svg/digital-ocean.svg
                description: Apps and droplets
---
apiVersion: v1
kind: ServiceAccount
metadata:
    name: homepage
    namespace: homepage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    name: homepage
rules:
    - apiGroups: [""]
      resources: ["nodes", "pods", "namespaces", "services"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["apps"]
      resources: ["deployments", "statefulsets"]
      verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
    name: homepage
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: homepage
subjects:
    - kind: ServiceAccount
      name: homepage
      namespace: homepage
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: homepage
    namespace: homepage
spec:
    replicas: 1
    selector:
        matchLabels:
            app: homepage
    template:
        metadata:
            labels:
                app: homepage
        spec:
            serviceAccountName: homepage
            containers:
                - name: homepage
                  image: ghcr.io/gethomepage/homepage:latest
                  env:
                      - name: HOMEPAGE_ALLOWED_HOSTS
                        value: homepage.home.lab,homepage.home.lab:30080
                  ports:
                      - containerPort: 3000
                  volumeMounts:
                      - name: config
                        mountPath: /app/config
                      - name: logs
                        mountPath: /app/config/logs
            volumes:
                - name: config
                  configMap:
                      name: homepage-config
                - name: logs
                  emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
    name: homepage
    namespace: homepage
spec:
    selector:
        app: homepage
    ports:
        - port: 80
          targetPort: 3000
