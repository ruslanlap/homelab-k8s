name: Build and Deploy K8s Homelab Guide

on:
  push:
    branches: [main, master]
    paths:
      - 'k8s-homelab-guide/**'
      - '.github/workflows/deploy-guide-pages.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

concurrency:
  group: deploy-guide-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: k8s-homelab-guide/package-lock.json

      - name: Install dependencies
        working-directory: k8s-homelab-guide
        run: npm ci

      - name: Build
        working-directory: k8s-homelab-guide
        run: npm run build -- --base=/homelab-k8s/

      - name: Publish to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf gh-pages-worktree
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git worktree add -B gh-pages gh-pages-worktree origin/gh-pages
          else
            git worktree add -B gh-pages gh-pages-worktree
          fi

          rsync -av --delete --exclude='.git' k8s-homelab-guide/dist/ gh-pages-worktree/
          touch gh-pages-worktree/.nojekyll

          cd gh-pages-worktree
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Deploy guide from ${GITHUB_SHA}"
            for attempt in 1 2; do
              if git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages; then
                break
              fi

              if [ "$attempt" -eq 2 ]; then
                echo "Push failed after retry"
                exit 1
              fi

              git fetch origin gh-pages
              git rebase origin/gh-pages
            done
          else
            echo "No changes to deploy"
          fi
